<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#000000"/>

  <!-- Crosshair — behind circle/eye -->
  <line x1="100" y1="0"   x2="100" y2="200" stroke="#ffffff" stroke-width="2.8"/>
  <line x1="0"   y1="100" x2="200" y2="100" stroke="#ffffff" stroke-width="2.8"/>

  <!-- Outer targeting circle (r=82; tangent at x=18, x=182) -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#ffffff" stroke-width="3.5"/>

  <!-- Eye — upper arc: corners at (18,100) and (182,100), apex ~y=57 -->
  <path d="M 18,100 A 100,100 0 0,1 182,100" fill="none" stroke="#ffffff" stroke-width="3.5"/>

  <!-- Eye — lower arc (mirror) -->
  <path d="M 182,100 A 100,100 0 0,1 18,100"  fill="none" stroke="#ffffff" stroke-width="3.5"/>

  <!-- Iris ring -->
  <circle cx="100" cy="100" r="28" fill="none" stroke="#ffffff" stroke-width="3.5"/>

  <!-- Pupil -->
  <circle cx="100" cy="100" r="5.5" fill="#ffffff"/>
</svg>